services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ai_classroom
      POSTGRES_USER: ai_classroom
      POSTGRES_PASSWORD: ai_classroom_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_classroom -d ai_classroom"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  server:
    build:
      context: ../server
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ai_classroom
      SPRING_DATASOURCE_USERNAME: ai_classroom
      SPRING_DATASOURCE_PASSWORD: ai_classroom_dev
      JWT_SECRET: local-dev-change-me-local-dev-change-me
      UPLOAD_DIR: /tmp/ai-classroom-uploads
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  admin-web:
    build:
      context: ../admin-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - server

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - admin-web
      - server

volumes:
  postgres-data:
  redis-data:
  minio-data:
