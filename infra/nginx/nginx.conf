events {}

http {
  upstream admin_web {
    server admin-web:3000;
  }

  upstream api_server {
    server server:8080;
  }

  server {
    listen 80;

    location /api/ {
      proxy_pass http://api_server;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /actuator/ {
      proxy_pass http://api_server;
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass http://admin_web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
